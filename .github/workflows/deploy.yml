name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: maxwell actions

    steps:
      - name: Starting deploy
        run: echo "Starting Deployment"
      - name: Debug secrets
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          echo "Length: ${#VPS_IP}"
          echo "Length-User: ${#VPS_USER}"
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_PASSPHRASE}}
          script: |
            echo "in VPS 💻"
            cd /srv/apps/node_app
            echo "pulling 🪢"
            git pull origin main
            echo "deploying 😑"
            pm2 restart cd-test || pm2 start server.js --name cd-test
            echo "Deploy Sucess ✅"