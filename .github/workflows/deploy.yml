name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Starting deploy
        run: echo "Starting Deployment"
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "in VPS 💻"
            cd /srv/apps/node_app
            echo "pulling 🪢"
            git pull origin main
            echo "deploying 😑"
            pm2 restart cd-test || pm2 start server.js --name cd-test
            echo "Deploy Sucess ✅"